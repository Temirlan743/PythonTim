name: Run autotests

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: "select tests to run"
        required: true
        default: "all"

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.14

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v
